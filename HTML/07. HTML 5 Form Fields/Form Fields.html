<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01. Form Fields</title>
</head>
<body>
    <h1><center>Form Fields</center></h1>

    <form action="">

        <!-- Name and Email and Number and Age Fields stats -->
        <p>
            <label for="Name"> Name</label>
            <input type="text" name="name" id="Name">
        </p>

         <p>
            <label for="email"> Email </label>
            <input type="email" name="email" id="email">
        </p>

        <p>
            <label for="Age"> Age </label>
            <input type="number" name="age" id="Age" min="18" max="35">
        </p>


        <!-- Date Field Start -->
        <p>
            <label for="Dob"> DOB </label>
            <input type="date" name="Dob" id="DOB">
        </p>


        <!-- Range Field Start -->
        <p>
            <label for="range"> Price Range</label>
            <input type="range" name="range" id="range">
        </p>

        
        <!-- URL and Time and Week Search Fields Start-->
         <p>
            <label for="URL"> Url</label>
            <input type="url" name="url" id="URL">
        </p>
        
        <p>
            <label for="Time"> Time</label>
            <input type="time" name="time" id="time">
        </p>

        <p>
            <label for="Week"> Week</label>
            <input type="week" name="week" id="Week">
        </p>

        <p>
            <label for="Search"> Search</label>
            <input type="search" name="search" id="Search">
        </p>

        <input type="submit" name="submit" value="Submit">
        
    </form> 
</body>
</html>
