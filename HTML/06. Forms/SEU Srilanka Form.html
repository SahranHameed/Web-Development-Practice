<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1 align="center"> <u> Student Registration Form </u></h1>
    <img src="SEUSL.jpg" alt="image" width="100%" height="300px" title="SEUSL">

   <form method="post"  enctype="multipart/form-data">
    <h3 align="center"> SOUTH EASTERN UNIVERCITY OF SRILANKA </h3>

    <h3 align="center"> Faculty of Managment & Commerce </h3>

        <fieldset>  
                <legend> <h3> Personal Information</h3> </legend>

                <table cellpadding="15px">

                   <tr>
                        <td><label for="name"> Full Name: </label> <input type="text" name="name" size="45" maxlength="25" id="name"> </td> 
                        <td><label for="name"> Name with Initial: </label> <input type="text" name="name" size="45" maxlength="25" id="name"> </td>
                        <td> <label for="email"> Email: </label> <input type="email" name="email" size="45" maxlength="25" id="email"> </td>
                        <td>
                            Gender: 
                            <input type="radio" name="Gender" value="Male" id="male" > <label for="male"> Male </label> 
                            <input type="radio" name="Gender" value="Female" id="female"> <label for="female"> Female </label> 
                             <input type="radio" name="Gender" value="Other" id="other"> <label for="other"> Other </label>
                        </td>

                        <td>
                            <label for="dob"> Date of Birth: </label><br>             
                            <input type="date" name="DOB" id="dob">
                       </td>  

                       <td>
                        <label for="nic"> NIC: </label><br>             
                        <input type="text" name="NIC" id="nic">
                   </td> 
   

                   </tr>
                       
                       
                  </p>

                </table>
        </fieldset>
  

        <fieldset> 
                <legend> <h3> Personal Information </h3> </legend>
                     <p>
                         <label for="address"> Address: </label> <br> <textarea name="Address" cols="40" rows="5" maxlength="15" id="address"> </textarea>
                    </p>
                              
                     
                     <p>
                        
                    </p>
        </fieldset>


        <fieldset>  
                <legend> <h3> Educational Qualification </h3> </legend>
                     <p>
                         <label for=""> Courses: </label><br>
                         <input type="checkbox" name="Courses[]" value="Software_Engineering" id="software"> <label for="software">Software Engineering </label>
                         <input type="checkbox" name="Courses[]" value="Web_Development" id="web"> <label for="web"> Web Development </label>
                         <input type="checkbox" name="Courses[]" value="Network_Engineering" id="network"> <label for="network"> Network Engineering </label>
                    </p>
                
                     <p>
                         <label for=""> Courses: </label><br> 
                         <select name="Courses[]" multiple size="3">
                                <option value="Software_Engineering"> Software Engineering</option>
                                <option value="Web_Development"> Web Development</option>
                                <option value="Network_Engineering"> Network Engineering</option>
                                <option value="Cisco_Networking"> Cisco Networking</option>
                                <option value="System_Security"> System Security</option>
                                <option value="Software_Architecture"> Software Architecture</option>
                                <option value="Software_Analysing"> Software Analysing</option>
                                <option value="Software_Developper"> Software Developper</option>
                        </select>
                    </p>
                
                     <p>
                         <label for="certificate"> Certificate: </label><br>
                         <input type="file" name="Certificate" id="certificate">
                    </p>
        </fieldset>

    <input type="submit" name="submit" value="submit">
    
   </form>
</body>
</html>
